<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSS Deck</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap');

:root{
  --bg-color:#FFFFFF; --surface-color:#F8F9FA; --text-main:#1A1A2E; --text-muted:#666680;
  --border-color:#E2E4EA;
  --color-p1:#D85A30; --color-p2:#534AB7; --color-p3:#0F6E56; --color-p4:#BA7517; --color-p5:#185FA5; --color-p6:#993556;
  --nav-height:56px; --radius:12px; --shadow:0 2px 16px rgba(0,0,0,0.08);
}
[data-theme="dark"]{
  --bg-color:#0F1117; --surface-color:#1A1D27; --text-main:#E8E8EC; --text-muted:#9090A8; --border-color:#2E3045;
}
*{box-sizing:border-box;}
body{
  margin:0; background:var(--bg-color); color:var(--text-main);
  font-family:'Inter',sans-serif; font-size:1rem; line-height:1.7;
  transition:background-color 300ms ease, color 300ms ease;
  overflow:hidden; height:100vh;
}
h1,h2,h3{font-family:'Playfair Display',serif; font-weight:700;}
h1{font-size:2.4rem;line-height:1.2;} h2{font-size:1.8rem;line-height:1.3;}
h3{font-family:'Inter',sans-serif;font-weight:600;font-size:1.2rem;line-height:1.4;}
.caption{font-family:'Inter',sans-serif;font-size:0.8rem;color:var(--text-muted);}
.mono{font-family:'JetBrains Mono',monospace;font-size:13px;}
button{font-family:inherit;cursor:pointer;}
:focus-visible{box-shadow:0 0 0 3px rgba(0,95,204,0.5); outline:none;}

.icon-registry{position:absolute;width:0;height:0;overflow:hidden;}

.progress-bar{position:fixed;top:0;left:0;height:4px;background:var(--border-color);width:100%;z-index:50;}
.progress-fill{height:100%;width:0%;transition:width 280ms ease;background:var(--color-p1);}

.top-bar{
  position:fixed;top:4px;left:0;right:0;height:var(--nav-height);
  background:var(--surface-color);border-bottom:1px solid var(--border-color);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:49;
}
.slide-counter{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-muted);}
.top-bar-actions{display:flex;gap:8px;}
.icon-btn{
  width:36px;height:36px;border-radius:8px;border:1px solid var(--border-color);
  background:var(--bg-color);color:var(--text-main);display:flex;align-items:center;justify-content:center;
}
.icon-btn:hover{background:var(--border-color);}

#deck{position:absolute;top:60px;left:0;right:0;bottom:0;overflow:hidden;}
.slide{
  position:absolute;top:0;left:0;width:100%;height:100%;
  padding:48px 64px;opacity:0;pointer-events:none;overflow-y:auto;
  transition:opacity 280ms ease, transform 280ms cubic-bezier(0,0,0.2,1);
  will-change:transform,opacity;
}
.slide.active{opacity:1;pointer-events:all;transform:none;}
.slide.exit-left{opacity:0;transform:translateX(-24px);}
.slide.exit-right{opacity:0;transform:translateX(24px);}
.slide.enter-left{transform:translateX(-24px);}
.slide.enter-right{transform:translateX(24px);}
.slide.sim-fade{transition:opacity 400ms ease;}
.slide.sim-fade.exit-left,.slide.sim-fade.exit-right,.slide.sim-fade.enter-left,.slide.sim-fade.enter-right{transform:none;}
.slide.part-boundary.exit-left,.slide.part-boundary.exit-right{transform:scale(0.97);}

.part-badge{position:absolute;top:16px;right:20px;width:16px;height:16px;opacity:0.4;}

.part-opening{
  font-family:'Playfair Display',serif;font-size:1.3rem;font-style:italic;
  padding:16px 20px;border-left:4px solid currentColor;margin-bottom:24px;max-width:70ch;
}

.slide-statement h1{max-width:16ch;}
.slide-statement .subhead{font-size:1.3rem;color:var(--text-muted);max-width:50ch;}

.evidence-stat{font-family:'JetBrains Mono',monospace;font-size:4rem;font-weight:400;margin:8px 0;}
.evidence-source{font-size:0.8rem;color:var(--text-muted);margin-bottom:16px;}

table.comparison{border-collapse:collapse;width:100%;max-width:900px;}
table.comparison th,table.comparison td{border:1px solid var(--border-color);padding:10px 14px;text-align:left;}
table.comparison th{background:var(--surface-color);}

.process-steps{display:flex;gap:16px;flex-wrap:wrap;margin-top:24px;}
.process-step{flex:1;min-width:180px;border:1px solid var(--border-color);border-radius:var(--radius);padding:16px;background:var(--surface-color);}
.process-step .step-num{font-family:'JetBrains Mono',monospace;color:var(--text-muted);font-size:0.8rem;}

.case-card{display:flex;gap:24px;align-items:flex-start;margin-top:16px;}
.badge{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-weight:700;font-size:1.2rem;color:#fff;flex-shrink:0;}
.case-fields dt{font-weight:600;margin-top:12px;} .case-fields dd{margin:0 0 0 0;color:var(--text-main);}

.sim-layout{display:flex;gap:32px;margin-top:16px;}
.sim-explain{flex:0 0 38%;}
.sim-stage{flex:1;border:1px solid var(--border-color);border-radius:var(--radius);background:var(--surface-color);display:flex;align-items:center;justify-content:center;min-height:340px;}
.btn-sim{min-width:180px;min-height:44px;padding:10px 20px;border-radius:8px;border:none;background:var(--color-p3);color:#fff;font-weight:600;margin-top:16px;}
.sim-stub{color:var(--text-muted);font-style:italic;padding:24px;text-align:center;}

.bridging{margin-top:20px;padding:12px 16px;border-radius:var(--radius);background:var(--surface-color);border:1px solid var(--border-color);font-size:0.95rem;}
.bridging .kind{font-family:'JetBrains Mono',monospace;font-size:0.75rem;text-transform:uppercase;color:var(--text-muted);}

.strategic-pause{max-width:900px;}
.sp-block{margin-bottom:20px;}
.sp-label{font-family:'JetBrains Mono',monospace;font-size:0.75rem;text-transform:uppercase;color:var(--text-muted);}

.framework-labels{list-style:none;padding:0;margin-top:16px;}
.framework-labels li{padding:8px 0;border-bottom:1px solid var(--border-color);}

.data-story-chart{display:flex;align-items:flex-end;gap:16px;height:220px;margin-top:24px;border-bottom:2px solid var(--border-color);padding-bottom:0;}
.bar-wrap{display:flex;flex-direction:column;align-items:center;flex:1;height:100%;justify-content:flex-end;}
.bar{width:60%;background:var(--color-p3);border-radius:4px 4px 0 0;transition:height 600ms ease;}
.bar-label{font-size:0.75rem;color:var(--text-muted);margin-top:6px;text-align:center;}

.title-slide{display:flex;flex-direction:column;justify-content:center;height:100%;}

.bottom-nav{position:fixed;bottom:20px;right:20px;display:flex;gap:12px;z-index:49;}
.nav-circle{width:48px;height:48px;border-radius:50%;border:1px solid var(--border-color);
  background:var(--surface-color);color:var(--text-main);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);}

.quiz-start,.quiz-results{max-width:700px;}
.btn-primary{min-height:44px;padding:10px 24px;border-radius:8px;border:none;background:var(--color-p3);color:#fff;font-weight:600;margin-top:16px;}
.quiz-options{display:flex;flex-direction:column;gap:10px;margin-top:20px;max-width:700px;}
.quiz-option{min-height:44px;text-align:left;padding:12px 16px;border-radius:8px;border:1px solid var(--border-color);background:var(--surface-color);color:var(--text-main);}
.quiz-option.correct{border-color:#1a7f37;background:rgba(26,127,55,0.12);}
.quiz-option.incorrect{border-color:#c62828;background:rgba(198,40,40,0.12);}
.quiz-option.locked{cursor:default;}
.quiz-explanation{margin-top:16px;padding:12px 16px;border-radius:8px;background:var(--surface-color);border:1px solid var(--border-color);max-width:700px;}
.quiz-progress{margin-bottom:4px;display:block;}
.score-display{font-family:'JetBrains Mono',monospace;font-size:3rem;}
.part-breakdown{display:flex;gap:12px;flex-wrap:wrap;margin:20px 0;}
.pb-cell{border:1px solid var(--border-color);border-radius:8px;padding:10px 14px;text-align:center;min-width:80px;}
.pb-label{font-size:0.75rem;color:var(--text-muted);}
.pb-score{font-family:'JetBrains Mono',monospace;font-size:1.1rem;}
.weakest-callout{margin:16px 0;padding:12px 16px;border-radius:8px;background:var(--surface-color);border:1px solid var(--border-color);}
.link-btn{background:none;border:none;color:var(--color-p5);text-decoration:underline;padding:0;font-size:inherit;}

.arch-components{display:flex;flex-wrap:wrap;gap:16px;margin-top:24px;}
.arch-component{flex:1;min-width:160px;border:2px solid var(--border-color);border-radius:var(--radius);padding:16px;background:var(--surface-color);}
.protocol-stack{display:flex;flex-direction:column;gap:2px;margin-top:20px;max-width:600px;}
.stack-layer{border:1px solid var(--border-color);padding:12px 16px;background:var(--surface-color);}
.layer-num{font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--text-muted);margin-right:8px;}
.algo-steps{font-family:'JetBrains Mono',monospace;font-size:0.9rem;line-height:1.8;margin-top:16px;padding-left:24px;}
.complexity-badge{margin-top:16px;padding:12px 16px;border-radius:8px;background:var(--surface-color);border:1px solid var(--border-color);display:inline-block;}
.benchmark-results{display:flex;gap:16px;flex-wrap:wrap;margin:16px 0;}
.bench-cell{border:1px solid var(--border-color);border-radius:8px;padding:12px 16px;min-width:120px;}
.bench-label{font-size:0.8rem;color:var(--text-muted);}
.bench-value{font-family:'JetBrains Mono',monospace;font-size:1.3rem;}
.formula-display{font-family:'JetBrains Mono',monospace;font-size:1.6rem;padding:24px;background:var(--surface-color);border-radius:var(--radius);border:1px solid var(--border-color);margin:16px 0;text-align:center;}
.variable-list dt{font-family:'JetBrains Mono',monospace;font-weight:600;margin-top:8px;}
.variable-list dd{margin:0 0 0 16px;color:var(--text-muted);}

@media print{
  .top-bar,.progress-bar,.bottom-nav{display:none !important;}
  #deck{position:static;overflow:visible;top:0;}
  .slide{position:relative !important;opacity:1 !important;transform:none !important;pointer-events:all !important;
    page-break-after:always;width:100% !important;height:auto !important;min-height:148mm;padding:12mm;overflow:visible;}
  svg{break-inside:avoid;}
  *{animation:none !important;transition:none !important;}
  @page{size:A4 landscape;margin:10mm;}
}
@media (prefers-reduced-motion: reduce){
  .slide{transition-duration:0ms !important;}
  *{animation:none !important;}
}
</style>
</head>
<body data-theme="light">

<svg class="icon-registry" aria-hidden="true">
<defs>
<symbol id="icon-risk" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" d="M12 3l7 3v6c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6l7-3z M12 9v4 M12 16h.01"/></symbol>

<symbol id="icon-data" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" d="M4 6c0-1.7 3.6-3 8-3s8 1.3 8 3-3.6 3-8 3-8-1.3-8-3z M4 6v12c0 1.7 3.6 3 8 3s8-1.3 8-3V6 M4 12c0 1.7 3.6 3 8 3s8-1.3 8-3"/></symbol>

</defs>
</svg>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="top-bar">
  <div class="slide-counter" id="slideCounter" aria-live="polite">Slide 1 / 1</div>
  <div class="top-bar-actions">
    <button class="icon-btn" id="themeToggle" aria-label="Toggle dark mode"><svg width="18" height="18"><use href="#icon-idea"/></svg></button>
    <button class="icon-btn" id="printBtn" aria-label="Print or export PDF"><svg width="18" height="18"><use href="#icon-data"/></svg></button>
    <button class="icon-btn" id="fullscreenBtn" aria-label="Toggle fullscreen"><svg width="18" height="18"><use href="#icon-globe"/></svg></button>
  </div>
</div>

<div id="deck"></div>

<div class="bottom-nav">
  <button class="nav-circle" id="prevBtn" aria-label="Previous slide">&#8592;</button>
  <button class="nav-circle" id="nextBtn" aria-label="Next slide">&#8594;</button>
</div>

<script>
const SSS_CONTENT = /*__SSS_CONTENT_JSON__*/ null;

const professionalColors = ['#003f5c','#4d648d','#2f4b7c','#665191','#a05195','#d45087','#f95d6a','#ff7c43','#ffa600'];
const QUIZ_STORAGE_KEY = 'sss_quiz_attempts';
const PART_MAX = {1:2,2:2,3:2,4:2,5:1,6:1};

let screens = [];   // flattened {partNumber, partName, accentRef, icon, opening, isFirstInPart, slide}
let current = 0;
let quizState = null; // {order, idx, answers, score, partScore}

function escapeHtml(str){
  if(str===undefined || str===null) return '';
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function buildScreens(content){
  const out = [];
  content.parts.forEach(part=>{
    part.slides.forEach(slide=>{
      out.push({
        partNumber: part.partNumber,
        partName: part.partName,
        accentRef: part.accentRef || null,
        icon: part.icon || null,
        opening: part.opening || null,
        isFirstInPart: part.slides[0] === slide,
        slide
      });
    });
  });
  out.push({partNumber:7, partName:'Assessment', accentRef:null, icon:null, opening:null, isFirstInPart:false, slide:{type:'quiz-start'}});
  out.push({partNumber:7, partName:'Assessment', accentRef:null, icon:null, opening:null, isFirstInPart:false, slide:{type:'quiz-container'}});
